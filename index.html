<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StateGen</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ── Toolbar ─────────────────────────────────────────────────────────── -->
  <div id="toolbar">

    <div class="toolbar-group">
      <button id="btn-zoom-in" class="toolbar-btn" title="Zoom In (= or +)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8"  x2="11"    y2="14"/>
          <line x1="8"  y1="11" x2="14"    y2="11"/>
        </svg>
        Zoom In
      </button>

      <span id="zoom-label" class="zoom-label">100%</span>

      <button id="btn-zoom-out" class="toolbar-btn" title="Zoom Out (-)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8"  y1="11" x2="14"    y2="11"/>
        </svg>
        Zoom Out
      </button>
    </div>

    <div class="toolbar-sep"></div>

    <div class="toolbar-group">
      <button id="btn-hand-tool" class="toolbar-btn tool-btn" title="Hand Tool – pan canvas (H or middle-mouse drag)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v1M10 5V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/>
          <path d="M18 11a2 2 0 1 1 4 0v3a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
        </svg>
        Hand
      </button>
    </div>

    <div class="toolbar-sep"></div>

    <div class="toolbar-group">
      <button id="btn-new-state" class="toolbar-btn palette-btn" draggable="false"
              title="Drag onto canvas to create a new State node">
        <span class="palette-icon-state" aria-hidden="true"></span>
        State
      </button>
    </div>

  </div>

  <!-- ── Canvas ──────────────────────────────────────────────────────────── -->
  <div id="canvas-container">
    <div id="canvas"></div>
  </div>

  <!-- ── Minimap ─────────────────────────────────────────────────────────── -->
  <div id="minimap" title="Minimap – drag the red rectangle to scroll the canvas">
    <div id="minimap-states"></div>
    <div id="minimap-viewport"></div>
    <span id="minimap-label">MAP</span>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
